---
- name: Check for yum/dnf updates with readable output
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Determine package manager command
      ansible.builtin.set_fact:
        pkg_mgr_cmd: "{{ 'dnf' if ansible_pkg_mgr == 'dnf' else 'yum' }}"

    - name: Gather available updates
      ansible.builtin.command: "{{ pkg_mgr_cmd }} -q list updates"
      register: updates_raw
      changed_when: false
      failed_when: false

    - name: Gather security update info
      ansible.builtin.command: "{{ pkg_mgr_cmd }} -q updateinfo list security"
      register: security_raw
      changed_when: false
      failed_when: false

    - name: Build parsed update lines
      ansible.builtin.set_fact:
        parsed_updates: >-
          {%- set ns = namespace(items=[]) -%}
          {%- set security_names = [] -%}

          {%- for line in security_raw.stdout_lines | default([]) -%}
            {%- set s = line | trim -%}
            {%- if s and
                  not s.startswith('Loaded plugins:') and
                  not s.startswith('Last metadata expiration check:') -%}
              {%- set parts = s.split() -%}
              {%- if parts | length > 1 -%}
                {%- set pkg_full = parts[1] -%}
                {%- set pkg_name = pkg_full | regex_replace('\\.[^.]+$', '') -%}
                {%- set _ = security_names.append(pkg_name) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}

          {%- for line in updates_raw.stdout_lines | default([]) -%}
            {%- set s = line | trim -%}
            {%- if s and
                  not s.startswith('Loaded plugins:') and
                  not s.startswith('Last metadata expiration check:') and
                  s != 'Updated Packages' and
                  s != 'Available Upgrades' and
                  s != 'Obsoleting Packages' -%}
              {%- set parts = s.split() -%}
              {%- if parts | length >= 3 -%}
                {%- set pkg_full = parts[0] -%}
                {%- set pkg_name = pkg_full | regex_replace('\\.[^.]+$', '') -%}
                {%- set pkg_arch = (pkg_full | regex_search('\\.([^.]+)$', '\\1') | default(['unknown']) | first) -%}
                {%- set pkg_version = parts[1] -%}
                {%- set pkg_repo = parts[2] -%}
                {%- set _ = ns.items.append({
                      'name': pkg_name,
                      'arch': pkg_arch,
                      'version': pkg_version,
                      'repo': pkg_repo,
                      'security': (pkg_name in security_names)
                    }) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}

          {{
            ns.items
            | sort(attribute='name')
            | sort(attribute='security', reverse=true)
          }}
      no_log: true

    - name: Show fully up-to-date hosts
      ansible.builtin.debug:
        msg: |
          Host: {{ inventory_hostname }}
          Status: Up to date
          Total updates: 0
          Security updates: 0
      when: parsed_updates | length == 0

    - name: Show readable update report
      ansible.builtin.debug:
        msg: |
          Host: {{ inventory_hostname }}
          Status: Updates available
          Total updates: {{ parsed_updates | length }}
          Security updates: {{ parsed_updates | selectattr('security', 'equalto', true) | list | length }}

          TYPE        PACKAGE                          ARCH     VERSION                      REPO
          ----------------------------------------------------------------------------------------
          {% for pkg in parsed_updates %}
          {{ '%-11s %-32s %-8s %-28s %s' | format(
              '[SECURITY]' if pkg.security else '[OTHER]',
              pkg.name,
              pkg.arch,
              pkg.version,
              pkg.repo
          ) }}
          {% endfor %}
      when: parsed_updates | length > 0