---
- name: Check for yum/dnf updates with readable, colorized output
  hosts: all
  become: true
  gather_facts: true

  vars:
    color_reset: "\u001b[0m"
    color_red: "\u001b[31m"
    color_yellow: "\u001b[33m"
    color_green: "\u001b[32m"
    color_cyan: "\u001b[36m"
    color_bold: "\u001b[1m"

  tasks:
    - name: Determine package manager command
      ansible.builtin.set_fact:
        pkg_mgr_cmd: "{{ 'dnf' if ansible_pkg_mgr == 'dnf' else 'yum' }}"

    - name: Gather available updates
      ansible.builtin.command: "{{ pkg_mgr_cmd }} -q list updates"
      register: updates_raw
      changed_when: false
      failed_when: false

    - name: Gather security update info
      ansible.builtin.command: "{{ pkg_mgr_cmd }} -q updateinfo list security"
      register: security_raw
      changed_when: false
      failed_when: false

    - name: Build list of security package names
      ansible.builtin.set_fact:
        security_package_names: >-
          {{
            security_raw.stdout_lines
            | default([])
            | map('trim')
            | reject('equalto', '')
            | reject('search', '^(Loaded plugins:|Last metadata expiration check:|Update notice|Security notice|RHSA|ALAS|ELSA|CEBA|FEDORA-EPEL)')
            | map('regex_replace', '^\\S+\\s+(\\S+).*$', '\\1')
            | map('regex_replace', '-[0-9][^-]*.*$', '')
            | list
            | unique
          }}

    - name: Build structured update list
      ansible.builtin.set_fact:
        update_list: "{{ (update_list | default([])) + [ {
          'name': (pkg_name_arch | regex_replace('\\.[^.]+$', '')),
          'arch': (pkg_name_arch | regex_search('\\.([^.]+)$', '\\1') | default(['unknown']) | first),
          'full_name': pkg_name_arch,
          'version': pkg_version,
          'repo': pkg_repo,
          'security': ((pkg_name_arch | regex_replace('\\.[^.]+$', '')) in security_package_names)
        } ] }}"
      vars:
        pkg_name_arch: "{{ (item.split())[0] }}"
        pkg_version: "{{ (item.split())[1] if (item.split() | length) > 1 else 'unknown' }}"
        pkg_repo: "{{ (item.split())[2] if (item.split() | length) > 2 else 'unknown' }}"
      loop: >-
        {{
          updates_raw.stdout_lines
          | default([])
          | map('trim')
          | reject('equalto', '')
          | reject('search', '^(Loaded plugins:|Last metadata expiration check:|Updated Packages|Available Upgrades)')
          | list
        }}
      when:
        - updates_raw.rc is defined
        - updates_raw.rc in [0, 100]

    - name: Sort updates with security first, then package name
      ansible.builtin.set_fact:
        sorted_updates: >-
          {{
            (update_list | default([]))
            | sort(attribute='name')
            | sort(attribute='security', reverse=true)
          }}

    - name: Show fully up-to-date hosts
      ansible.builtin.debug:
        msg: >-
          {{ color_bold }}{{ color_green }}Host {{ inventory_hostname }} is fully up to date.{{ color_reset }}
      when: (sorted_updates | default([]) | length) == 0

    - name: Show update summary header
      ansible.builtin.debug:
        msg: |
          {{ color_bold }}{{ color_cyan }}Host: {{ inventory_hostname }}{{ color_reset }}
          {{ color_bold }}Total updates: {{ sorted_updates | length }}{{ color_reset }}
          {{ color_bold }}Security updates: {{ sorted_updates | selectattr('security', 'equalto', true) | list | length }}{{ color_reset }}
      when: (sorted_updates | default([]) | length) > 0

    - name: Show sorted, colorized update list
      ansible.builtin.debug:
        msg: >-
          {{
            (
              color_red + '[SECURITY] ' + color_reset
              if item.security else
              color_yellow + '[BUGFIX/OTHER] ' + color_reset
            )
            + item.name
            + '.'
            + item.arch
            + ' -> '
            + item.version
            + ' (repo: '
            + item.repo
            + ')'
          }}
      loop: "{{ sorted_updates }}"
      when: (sorted_updates | default([]) | length) > 0