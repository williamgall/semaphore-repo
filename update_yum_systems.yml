---
- name: Update all systems with yum/dnf
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update all installed packages
      ansible.builtin.yum:
        name: '*'
        state: latest
        update_only: true
        update_cache: true
      register: package_update_result
      when: ansible_pkg_mgr in ['yum', 'dnf']

    - name: Check whether reboot is required
      ansible.builtin.command: /usr/bin/needs-restarting -r
      register: reboot_check
      changed_when: false
      failed_when: reboot_check.rc not in [0, 1]

    - name: Show update and reboot summary
      ansible.builtin.debug:
        msg: |
          Host: {{ inventory_hostname }}
          Packages changed: {{ package_update_result.changed | default(false) }}
          Reboot required: {{ 'Yes' if reboot_check.rc == 1 else 'No' }}
          {% if reboot_check.rc == 1 %}
          {{ reboot_check.stdout }}
          {% endif %}

    - name: Reboot the system if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible after package updates"
        reboot_timeout: 900
        connect_timeout: 10
        post_reboot_delay: 15
      when: reboot_check.rc == 1